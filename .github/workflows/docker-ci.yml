name: Docker Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-web-app .

      - name: Run container in background
        run: docker run -d -p 3000:3000 --name test-container my-web-app

      - name: Wait for server to start
        run: sleep 5

      - name: Test the endpoint
        run: curl --fail http://localhost:3000 || exit 1

      - name: Stop and remove container
        run: docker stop test-container